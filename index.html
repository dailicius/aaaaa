<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Otomatis</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background: #f3f4f6;
    }

    .sidebar {
      width: 250px;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar button, .sidebar select {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .sidebar button:hover {
      background: #334155;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .page { display: none; }
    .active { display: block; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    .submit {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      font-size: 16px;
    }

    .danger {
      background: #dc2626 !important;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 15px;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 5px;
    }

    @media(max-width:768px){
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
      }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>Laporan</h2>

  <select id="globalShift" onchange="changeShift()">
    <option value="shift1">Shift 1</option>
    <option value="shift2">Shift 2</option>
  </select>

  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('data')">Penjualan Data</button>
  <button onclick="showPage('acc')">Penjualan ACC</button>
  <button onclick="showPage('transfer')">Lap Transfer</button>
  <button onclick="showPage('tartun')">Lap Tarik Tunai</button>
  <button onclick="showPage('pengeluaran')">Lap Pengeluaran</button>
  <button onclick="showPage('telegram')">Lap Telegram</button>

  <button class="danger" onclick="resetDB()">Hapus DB Shift Ini</button>
</div>

<div class="content">

  <!-- HOME -->
  <div id="home" class="page active">
    <h1>Dashboard Laporan</h1>
    <h2 id="shiftTitle"></h2>
    <div class="grid" id="dashboard"></div>
  </div>

  <!-- DATA -->
  <div id="data" class="page">
    <div class="card">
      <h2>Penjualan Data</h2>
      <input type="number" id="dataNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveData()">Simpan</button>
      <ul id="dataList"></ul>
    </div>
  </div>

  <!-- ACC -->
  <div id="acc" class="page">
    <div class="card">
      <h2>Penjualan ACC</h2>
      <input type="number" id="accNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveAcc()">Simpan</button>
      <ul id="accList"></ul>
    </div>
  </div>

  <!-- TRANSFER -->
  <div id="transfer" class="page">
    <div class="card">
      <h2>Lap Transfer</h2>
      <input type="number" id="transferNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveTransfer()">Simpan</button>
      <ul id="transferList"></ul>
    </div>
  </div>

  <!-- TARTUN -->
  <div id="tartun" class="page">
    <div class="card">
      <h2>Lap Tarik Tunai</h2>
      <select id="tartunMode">
        <option value="normal">Normal</option>
        <option value="switch">Switch</option>
      </select>
      <input type="number" id="tartunNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveTartun()">Simpan</button>
      <ul id="tartunList"></ul>
    </div>
  </div>

  <!-- PENGELUARAN -->
  <div id="pengeluaran" class="page">
    <div class="card">
      <h2>Lap Pengeluaran</h2>
      <input type="number" id="pengeluaranNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="savePengeluaran()">Simpan</button>
      <ul id="pengeluaranList"></ul>
    </div>
  </div>

  <!-- TELEGRAM -->
  <div id="telegram" class="page">
    <div class="card">
      <h2>Lap Telegram</h2>
      <input type="number" id="telegramNominal" placeholder="Masukkan nominal telegram">
      <button class="submit" onclick="saveTelegram()">Simpan</button>
      <ul id="telegramList"></ul>
    </div>
  </div>

</div>

<script>
  let currentShift = localStorage.getItem("currentShift") || "shift1";

  function getDefaultDB() {
    return {
      data: [],
      acc: [],
      transfer: [],
      tartun: [],
      pengeluaran: [],
      telegram: []
    };
  }

  function getDB() {
    return JSON.parse(localStorage.getItem(currentShift)) || getDefaultDB();
  }

  function saveDB(db) {
    localStorage.setItem(currentShift, JSON.stringify(db));
    renderAll();
  }

  function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
  }

  function changeShift() {
    currentShift = document.getElementById("globalShift").value;
    localStorage.setItem("currentShift", currentShift);
    renderAll();
  }

  function resetDB() {
    if(confirm("Hapus semua data shift ini?")) {
      localStorage.removeItem(currentShift);
      renderAll();
    }
  }

  function sum(arr) {
    return arr.reduce((a,b)=>a+b,0);
  }

  function saveData() {
    let db = getDB();
    let nominal = +document.getElementById("dataNominal").value;
    if(nominal > 0){
      db.data.push(nominal);
      document.getElementById("dataNominal").value = "";
      saveDB(db);
    }
  }

  function saveAcc() {
    let db = getDB();
    let nominal = +document.getElementById("accNominal").value;
    if(nominal > 0){
      db.acc.push(nominal);
      document.getElementById("accNominal").value = "";
      saveDB(db);
    }
  }

  function saveTransfer() {
    let db = getDB();
    let nominal = +document.getElementById("transferNominal").value;
    if(nominal > 0){
      db.transfer.push(nominal);
      document.getElementById("transferNominal").value = "";
      saveDB(db);
    }
  }

  function saveTartun() {
    let db = getDB();
    let nominal = +document.getElementById("tartunNominal").value;
    let mode = document.getElementById("tartunMode").value;

    if(nominal > 0){
      let saldo = nominal;

      if(mode === "normal" && nominal >= 10000 && nominal <= 299000){
        saldo = nominal - 3000;
      }

      if(mode === "switch" && nominal >= 10000){
        saldo = nominal - 5000;
      }

      db.tartun.push({
        tunai: nominal,
        saldo: saldo,
        mode: mode
      });

      document.getElementById("tartunNominal").value = "";
      saveDB(db);
    }
  }

  function savePengeluaran() {
    let db = getDB();
    let nominal = +document.getElementById("pengeluaranNominal").value;
    if(nominal > 0){
      db.pengeluaran.push(nominal);
      document.getElementById("pengeluaranNominal").value = "";
      saveDB(db);
    }
  }

  function saveTelegram() {
    let db = getDB();
    let nominal = +document.getElementById("telegramNominal").value;
    if(nominal > 0){
      db.telegram.push(nominal);
      document.getElementById("telegramNominal").value = "";
      saveDB(db);
    }
  }

  function renderList(id, arr, prefix="Rp ") {
    document.getElementById(id).innerHTML =
      arr.map(item => {
        if(typeof item === "object"){
          return `<li>${item.mode.toUpperCase()} | Tunai: Rp ${item.tunai.toLocaleString()} | Saldo: Rp ${item.saldo.toLocaleString()}</li>`;
        }
        return `<li>${prefix}${item.toLocaleString()}</li>`;
      }).join("");
  }

  function renderAll() {
    document.getElementById("globalShift").value = currentShift;

    let db = getDB();

    let totalData = sum(db.data);
    let totalAcc = sum(db.acc);
    let totalTransfer = sum(db.transfer);
    let totalPengeluaran = sum(db.pengeluaran);
    let totalTelegram = sum(db.telegram);

    let totalTartun = db.tartun.reduce((a,b)=>a + b.tunai + b.saldo,0);

    let total = totalData + totalAcc + totalTelegram;
    let setor = total - totalTartun - totalPengeluaran;
    let totalTrx = db.data.length + db.acc.length + db.telegram.length;

    document.getElementById("shiftTitle").innerText =
      `Laporan ${currentShift === "shift1" ? "Shift 1" : "Shift 2"}`;

    document.getElementById("dashboard").innerHTML = `
      <div class="card">Data: Rp ${totalData.toLocaleString()}</div>
      <div class="card">ACC: Rp ${totalAcc.toLocaleString()}</div>
      <div class="card">Telegram: Rp ${totalTelegram.toLocaleString()}</div>
      <div class="card">TOTAL: Rp ${total.toLocaleString()}</div>
      <div class="card">TARTUN: Rp ${totalTartun.toLocaleString()}</div>
      <div class="card">Pengeluaran: Rp ${totalPengeluaran.toLocaleString()}</div>
      <div class="card">SETOR: Rp ${setor.toLocaleString()}</div>
      <div class="card">Total TRX: ${totalTrx}</div>
    `;

    renderList("dataList", db.data);
    renderList("accList", db.acc);
    renderList("transferList", db.transfer);
    renderList("tartunList", db.tartun);
    renderList("pengeluaranList", db.pengeluaran);
    renderList("telegramList", db.telegram);
  }

  renderAll();
</script>

</body>
</html>

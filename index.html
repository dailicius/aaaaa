<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Otomatis</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background: #f3f4f6;
    }

    .sidebar {
      width: 270px;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .sidebar button, .sidebar select {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .sidebar button:hover {
      background: #334155;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .page { display: none; }
    .active { display: block; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    .submit {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      font-size: 16px;
    }

    .danger {
      background: #dc2626 !important;
    }

    .edit {
      background: orange;
      color: white;
      border: none;
      padding: 4px 8px;
      margin-left: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    .hapus {
      background: red;
      color: white;
      border: none;
      padding: 4px 8px;
      margin-left: 5px;
      border-radius: 6px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
      gap: 15px;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    @media(max-width:768px){
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-height: auto;
      }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>Laporan</h2>

  <select id="globalShift" onchange="changeShift()">
    <option value="shift1">Shift 1</option>
    <option value="shift2">Shift 2</option>
  </select>

  <select id="inputMode">
    <option value="normal">Input Normal</option>
    <option value="cepat">Input Cepat</option>
  </select>

  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('quantity')">Total Quantity</button>
  <button onclick="showPage('data')">Penjualan Data</button>
  <button onclick="showPage('acc')">Penjualan ACC</button>
  <button onclick="showPage('transfer')">Lap Transfer</button>
  <button onclick="showPage('tartun')">Lap Tarik Tunai</button>
  <button onclick="showPage('pengeluaran')">Lap Pengeluaran</button>
  <button onclick="showPage('telegram')">Lap Telegram</button>

  <button class="danger" onclick="resetDB()">Hapus DB Shift Ini</button>
</div>

<div class="content">

  <div id="home" class="page active">
    <h1>Dashboard Laporan</h1>
    <h2 id="shiftTitle"></h2>
    <div class="grid" id="dashboard"></div>
  </div>

  <div id="quantity" class="page">
    <h1>Total Quantity Shift</h1>
    <div class="grid" id="quantityDashboard"></div>
  </div>

  <div id="data" class="page">
    <div class="card">
      <h2>Penjualan Data</h2>
      <input type="text" id="dataNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveData()">Simpan</button>
      <ul id="dataList"></ul>
    </div>
  </div>

  <div id="acc" class="page">
    <div class="card">
      <h2>Penjualan ACC</h2>
      <input type="text" id="accNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveAcc()">Simpan</button>
      <ul id="accList"></ul>
    </div>
  </div>

  <div id="transfer" class="page">
    <div class="card">
      <h2>Lap Transfer</h2>
      <input type="text" id="transferNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveTransfer()">Simpan</button>
      <ul id="transferList"></ul>
    </div>
  </div>

  <div id="tartun" class="page">
    <div class="card">
      <h2>Lap Tarik Tunai</h2>
      <select id="tartunMode">
        <option value="normal">Normal</option>
        <option value="switch">Switch</option>
      </select>
      <input type="text" id="tartunNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="saveTartun()">Simpan</button>
      <ul id="tartunList"></ul>
    </div>
  </div>

  <div id="pengeluaran" class="page">
    <div class="card">
      <h2>Lap Pengeluaran</h2>
      <input type="text" id="pengeluaranNominal" placeholder="Masukkan nominal">
      <button class="submit" onclick="savePengeluaran()">Simpan</button>
      <ul id="pengeluaranList"></ul>
    </div>
  </div>

  <div id="telegram" class="page">
    <div class="card">
      <h2>Lap Telegram</h2>
      <input type="text" id="telegramNominal" placeholder="Masukkan total telegram">
      <input type="number" id="telegramQty" placeholder="Masukkan quantity / trx telegram">
      <button class="submit" onclick="saveTelegram()">Simpan / Update</button>
      <button class="submit danger" onclick="resetTelegram()">Hapus Telegram</button>
      <ul id="telegramList"></ul>
    </div>
  </div>

</div>

<script>
  let currentShift = localStorage.getItem("currentShift") || "shift1";

  function getDefaultDB() {
    return {
      data: [],
      acc: [],
      transfer: [],
      tartun: [],
      pengeluaran: [],
      telegram: { nominal: 0, qty: 0 }
    };
  }

  function getDB() {
    return JSON.parse(localStorage.getItem(currentShift)) || getDefaultDB();
  }

  function saveDB(db) {
    localStorage.setItem(currentShift, JSON.stringify(db));
    renderAll();
  }

  function sum(arr) {
    return arr.reduce((a,b)=>a+b,0);
  }

  function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
  }

  function changeShift() {
    currentShift = document.getElementById("globalShift").value;
    localStorage.setItem("currentShift", currentShift);
    renderAll();
  }

  function resetDB() {
    if(confirm("Hapus semua data shift ini?")) {
      localStorage.removeItem(currentShift);
      renderAll();
    }
  }

  function parseNominal(value) {
    let mode = document.getElementById("inputMode").value;

    if (!value) return 0;

    value = value.toString().replace(/,/g, ".").trim();

    if (mode === "normal") {
      return parseInt(value.replace(/\./g, "")) || 0;
    }

    if (mode === "cepat") {

      if (value.includes(".")) {
        let parts = value.split(".");
        let depan = parts[0];
        let belakang = parts[1] || "";

        if (belakang.length === 1) return parseInt(depan + belakang + "00");
        if (belakang.length === 2) return parseInt(depan + belakang + "0");
        if (belakang.length === 3) return parseInt(depan + belakang);
        if (belakang.length >= 4) return parseInt((depan + belakang) + "000");
      }

      return parseInt(value) * 1000;
    }

    return 0;
  }

  function saveData() {
    let db = getDB();
    let nominal = parseNominal(document.getElementById("dataNominal").value);
    if(nominal > 0){
      db.data.push(nominal);
      document.getElementById("dataNominal").value = "";
      saveDB(db);
    }
  }

  function saveAcc() {
    let db = getDB();
    let nominal = parseNominal(document.getElementById("accNominal").value);
    if(nominal > 0){
      db.acc.push(nominal);
      document.getElementById("accNominal").value = "";
      saveDB(db);
    }
  }

  function saveTransfer() {
    let db = getDB();
    let nominal = parseNominal(document.getElementById("transferNominal").value);
    if(nominal > 0){
      db.transfer.push(nominal);
      document.getElementById("transferNominal").value = "";
      saveDB(db);
    }
  }

  function getTartunAdmin(mode, nominal) {
    if (mode === "normal") {
      if (nominal >= 10000 && nominal <= 299000) return 3000;
      if (nominal >= 300000 && nominal <= 499000) return 5000;
      if (nominal >= 500000 && nominal <= 999000) return 7500;
      if (nominal >= 1000000 && nominal <= 2000000) return 10000;
    }

    if (mode === "switch") {
      if (nominal >= 10000 && nominal <= 299000) return 5000;
      if (nominal >= 300000 && nominal <= 499000) return 10000;
      if (nominal >= 500000 && nominal <= 999000) return 17500;
      if (nominal >= 1000000 && nominal <= 2000000) return 32500;
    }

    return 0;
  }

  function saveTartun() {
    let db = getDB();
    let nominal = parseNominal(document.getElementById("tartunNominal").value);
    let mode = document.getElementById("tartunMode").value;

    if (nominal < 10000 || nominal > 2000000) {
      alert("Nominal tarik tunai minimal 10.000 dan maksimal 2.000.000");
      return;
    }

    let admin = getTartunAdmin(mode, nominal);

    db.tartun.push({
      tunai: nominal,
      saldo: nominal - admin,
      mode: mode
    });

    document.getElementById("tartunNominal").value = "";
    saveDB(db);
  }

  function savePengeluaran() {
    let db = getDB();
    let nominal = parseNominal(document.getElementById("pengeluaranNominal").value);
    if(nominal > 0){
      db.pengeluaran.push(nominal);
      document.getElementById("pengeluaranNominal").value = "";
      saveDB(db);
    }
  }

  function saveTelegram() {
    let db = getDB();

    let nominal = parseNominal(document.getElementById("telegramNominal").value);
    let qty = +document.getElementById("telegramQty").value;

    if (nominal >= 0 && qty >= 0) {
      db.telegram = {
        nominal: nominal,
        qty: qty
      };

      document.getElementById("telegramNominal").value = "";
      document.getElementById("telegramQty").value = "";

      saveDB(db);
    }
  }

  function resetTelegram() {
    let db = getDB();

    if(confirm("Hapus data telegram shift ini?")) {
      db.telegram = { nominal: 0, qty: 0 };
      saveDB(db);
    }
  }

  function deleteItem(type, index) {
    let db = getDB();
    if(confirm("Hapus data ini?")) {
      db[type].splice(index, 1);
      saveDB(db);
    }
  }

  function editItem(type, index) {
    let db = getDB();
    let newValue = prompt("Edit nominal:", db[type][index]);

    if(newValue !== null){
      let nominal = parseNominal(newValue);
      if(nominal >= 0){
        db[type][index] = nominal;
        saveDB(db);
      }
    }
  }

  function editTartun(index) {
    let db = getDB();
    let item = db.tartun[index];

    let newNominal = prompt("Edit nominal tartun:", item.tunai);

    if(newNominal === null) return;

    let nominal = parseNominal(newNominal);

    if (nominal < 10000 || nominal > 2000000) {
      alert("Nominal tarik tunai minimal 10.000 dan maksimal 2.000.000");
      return;
    }

    let admin = getTartunAdmin(item.mode, nominal);

    db.tartun[index] = {
      tunai: nominal,
      saldo: nominal - admin,
      mode: item.mode
    };

    saveDB(db);
  }

  function deleteTartun(index) {
    let db = getDB();
    if(confirm("Hapus tartun ini?")) {
      db.tartun.splice(index, 1);
      saveDB(db);
    }
  }

  function renderList(id, arr, type) {
    document.getElementById(id).innerHTML =
      arr.map((item, index) => {
        if(typeof item === "object"){
          return `
            <li>
              ${item.mode.toUpperCase()} | Tunai: Rp ${item.tunai.toLocaleString()} | Saldo: Rp ${item.saldo.toLocaleString()}
              <button class="edit" onclick="editTartun(${index})">Edit</button>
              <button class="hapus" onclick="deleteTartun(${index})">Hapus</button>
            </li>
          `;
        }

        return `
          <li>
            Rp ${item.toLocaleString()}
            <button class="edit" onclick="editItem('${type}', ${index})">Edit</button>
            <button class="hapus" onclick="deleteItem('${type}', ${index})">Hapus</button>
          </li>
        `;
      }).join("");
  }

  function renderAll() {
    document.getElementById("globalShift").value = currentShift;

    let db = getDB();

    let totalData = sum(db.data);
    let totalAcc = sum(db.acc);
    let totalTfNominal = sum(db.transfer);
    let totalPengeluaran = sum(db.pengeluaran);

    let telegramNominal = db.telegram.nominal;
    let telegramQty = db.telegram.qty;

    if (currentShift === "shift2") {
      let shift1 = JSON.parse(localStorage.getItem("shift1")) || getDefaultDB();

      telegramNominal = db.telegram.nominal - shift1.telegram.nominal;
      telegramQty = db.telegram.qty - shift1.telegram.qty;

      if (telegramNominal < 0) telegramNominal = 0;
      if (telegramQty < 0) telegramQty = 0;
    }

    let totalTartun = db.tartun.reduce((a,b)=>a+b.tunai+b.saldo,0);
    let totalTarikNominal = db.tartun.reduce((a,b)=>a+b.tunai,0);

    let total = totalData + totalAcc + telegramNominal;
    let setor = total - totalTartun - totalPengeluaran;

    let totalTrx = db.data.length + db.acc.length + telegramQty + db.transfer.length + db.tartun.length;

    document.getElementById("shiftTitle").innerText =
      `Laporan ${currentShift === "shift1" ? "Shift 1" : "Shift 2"}`;

    document.getElementById("dashboard").innerHTML = `
      <div class="card">Data: Rp ${totalData.toLocaleString()}</div>
      <div class="card">ACC: Rp ${totalAcc.toLocaleString()}</div>
      <div class="card">Telegram: Rp ${telegramNominal.toLocaleString()}</div>
      <div class="card">TOTAL: Rp ${total.toLocaleString()}</div>
      <div class="card">TARTUN: Rp ${totalTartun.toLocaleString()}</div>
      <div class="card">Pengeluaran: Rp ${totalPengeluaran.toLocaleString()}</div>
      <div class="card">SETOR: Rp ${setor.toLocaleString()}</div>
      <div class="card">Total TRX: ${totalTrx}</div>
    `;

    document.getElementById("quantityDashboard").innerHTML = `
      <div class="card">Data: Rp ${totalData.toLocaleString()} (${db.data.length})</div>
      <div class="card">TF: Rp ${totalTfNominal.toLocaleString()} (${db.transfer.length})</div>
      <div class="card">Tarik: Rp ${totalTarikNominal.toLocaleString()} (${db.tartun.length})</div>
      <div class="card">TOTAL Quantity: ${db.data.length + db.transfer.length + db.tartun.length}</div>
    `;

    renderList("dataList", db.data, "data");
    renderList("accList", db.acc, "acc");
    renderList("transferList", db.transfer, "transfer");
    renderList("tartunList", db.tartun, "tartun");
    renderList("pengeluaranList", db.pengeluaran, "pengeluaran");

    document.getElementById("telegramList").innerHTML = `
      <li>Total: Rp ${telegramNominal.toLocaleString()} | Qty: ${telegramQty}</li>
    `;
  }

  renderAll();
</script>

</body>
</html>
